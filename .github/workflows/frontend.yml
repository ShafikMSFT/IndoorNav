name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: indoornav-dev-api
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Upload built frontend to Azure Blob Storage (static site)
      # Or deploy as part of the backend's static files
      - name: Upload to Blob Storage ($web)
        run: |
          az storage blob upload-batch \
            --account-name indoornavdevstor \
            --destination '$web' \
            --source frontend/dist \
            --overwrite
